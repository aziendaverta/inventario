<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0e0c">
<title>TBH · Inventario</title>
<style>
  :root{
    --ink:#0f0e0c; --paper:#f4efe4; --paper-2:#e7ddc8;
    --bar:#a3320b; --resto:#1f5f3f; --accent:#b8860b;
    --muted:#6b6358; --ok:#15803d; --warn:#b91c1c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:16px;line-height:1.4;overscroll-behavior:none;
  }
  header{position:sticky;top:0;z-index:50;background:var(--ink);color:var(--paper);padding:env(safe-area-inset-top) 0 0}
  .h-top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}
  .h-title{font-weight:700;font-size:15px}
  .h-title .cat{color:var(--accent);font-weight:600;font-size:12px;display:block;letter-spacing:.08em;text-transform:uppercase}
  .h-right{display:flex;align-items:center;gap:10px}
  .h-save{font-size:11px;color:#86efac;display:flex;align-items:center;gap:5px}
  .h-save .dot{width:7px;height:7px;border-radius:50%;background:#86efac}
  .gear{
    width:34px;height:34px;border-radius:8px;border:1px solid rgba(244,239,228,.3);
    background:transparent;color:var(--paper);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;
  }
  .gear:active{background:rgba(244,239,228,.15)}

  /* selettore categoria */
  .cat-bar{padding:8px 12px;background:#1a1410;border-top:1px solid rgba(244,239,228,.12)}
  .cat-select{
    width:100%;padding:10px 12px;font-size:14px;font-weight:700;font-family:inherit;
    background:var(--paper);color:var(--ink);border:none;border-radius:8px;
  }

  .tabs{display:flex;border-top:1px solid rgba(244,239,228,.15)}
  .tab{
    flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:700;
    letter-spacing:.05em;background:var(--ink);color:rgba(244,239,228,.5);
    border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;
  }
  .tab .badge{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;background:rgba(244,239,228,.15)}
  .tab.active.bar{color:#fff;border-bottom-color:var(--bar);background:#2a1410}
  .tab.active.resto{color:#fff;border-bottom-color:var(--resto);background:#0f2418}
  .tab.active.cuisine{color:#fff;border-bottom-color:var(--accent);background:#2a2410}
  .tab.active .badge{background:var(--accent);color:var(--ink)}
  .tab.disabled{opacity:.32;cursor:default}
  .tab.disabled .badge{display:none}

  .searchbar{padding:10px 16px;background:var(--paper-2);border-bottom:1px solid rgba(15,14,12,.12);position:sticky;top:0;z-index:40}
  .searchbar input{
    width:100%;padding:11px 14px;font-size:15px;border:1px solid rgba(15,14,12,.25);
    border-radius:9px;background:var(--paper);color:var(--ink);font-family:inherit;
  }
  .searchbar input:focus{outline:2px solid var(--accent);outline-offset:-1px}

  .progress{
    padding:8px 16px;font-size:12px;color:var(--muted);background:var(--paper-2);
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(15,14,12,.1);
  }
  .progress .pct{font-weight:700;color:var(--ink)}
  .pbar{height:4px;background:rgba(15,14,12,.12);border-radius:2px;overflow:hidden;flex:1;margin:0 12px}
  .pbar span{display:block;height:100%;background:var(--accent);transition:width .25s}
  .tipbar{background:#fff7e0;padding:6px 16px;font-size:11.5px;color:#6b6358;border-bottom:1px solid rgba(15,14,12,.1)}

  .list{padding:6px 0 140px}
  .item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(15,14,12,.08);background:var(--paper)}
  .item.counted{background:linear-gradient(90deg,rgba(184,134,11,.09),transparent)}
  .item-num{font-size:11px;color:var(--muted);font-weight:700;width:26px;text-align:right;flex:none}
  .item-info{flex:1;min-width:0}
  .item-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-meta{font-size:11px;color:var(--muted);margin-top:1px}
  .item-meta .ref{background:var(--paper-2);padding:1px 5px;border-radius:3px;margin-right:5px}
  .qty-box{display:flex;align-items:center;gap:6px}
  .qty-btn{
    width:34px;height:34px;border-radius:8px;border:1px solid rgba(15,14,12,.25);
    background:var(--paper-2);color:var(--ink);font-size:20px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;line-height:1;padding-bottom:2px;flex:none;
  }
  .qty-btn:active{background:var(--ink);color:var(--paper)}
  .qty-input{
    width:62px;height:34px;text-align:center;font-size:17px;font-weight:700;
    border:1px solid rgba(15,14,12,.3);border-radius:8px;background:var(--paper);
    color:var(--ink);font-family:inherit;
  }
  .qty-input:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .item.bar-mode .qty-input.has-val{background:#fff0e8;border-color:var(--bar)}
  .item.resto-mode .qty-input.has-val{background:#e8f3ec;border-color:var(--resto)}
  .item.single-mode .qty-input.has-val{background:#fff7e0;border-color:var(--accent)}
  .empty-search{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

  .footer{
    position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--ink);color:var(--paper);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;
  }
  .footer button{flex:1;padding:13px 10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-export{background:var(--accent);color:var(--ink)}
  .btn-reset{background:transparent;color:rgba(244,239,228,.6);border:1px solid rgba(244,239,228,.3);flex:0 0 90px}
  .footer button:active{transform:scale(.98)}

  .modal{position:fixed;inset:0;z-index:100;background:rgba(15,14,12,.7);display:none;align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .modal-box{background:var(--paper);border-radius:14px;padding:22px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto}
  .modal-box h3{font-size:19px;margin-bottom:6px}
  .modal-box p{font-size:13.5px;color:var(--muted);margin-bottom:16px}

  .col-block{margin-bottom:16px;border:1px solid rgba(15,14,12,.18);border-radius:10px;overflow:hidden}
  .col-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-weight:700;font-size:13px;color:#fff}
  .col-head .where{font-size:11px;font-weight:600;opacity:.85}
  .col-data{
    font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;background:var(--paper-2);
    padding:10px 14px;max-height:150px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;
    color:var(--ink);-webkit-user-select:text;user-select:text;
  }
  .modal-actions{display:flex;gap:10px;margin-top:4px}
  .modal-actions button{flex:1;padding:12px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .m-primary{background:var(--ink);color:var(--paper)}
  .m-ghost{background:var(--paper-2);color:var(--ink)}
  .m-pdf{background:var(--accent);color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);background:#fff7e0;border-left:3px solid var(--accent);padding:9px 12px;border-radius:6px;margin-bottom:16px;line-height:1.45}
  .bigsteps{font-size:12.5px;color:var(--ink);background:var(--paper-2);padding:11px 13px;border-radius:8px;margin-bottom:16px;line-height:1.6}

  .set-section{margin-bottom:20px}
  .set-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .lang-row{display:flex;gap:8px}
  .lang-btn{
    flex:1;padding:11px;border:1px solid rgba(15,14,12,.25);border-radius:9px;
    background:var(--paper-2);color:var(--ink);font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .lang-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .price-cat-sel{
    width:100%;padding:9px 12px;font-size:13px;font-weight:700;font-family:inherit;
    border:1px solid rgba(15,14,12,.25);border-radius:8px;background:var(--paper);
    color:var(--ink);margin-bottom:8px;
  }
  .price-list{max-height:38vh;overflow-y:auto;border:1px solid rgba(15,14,12,.15);border-radius:9px}
  .price-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(15,14,12,.08)}
  .price-row:last-child{border-bottom:none}
  .price-name{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .price-input{
    width:78px;height:32px;text-align:right;font-size:14px;font-weight:700;
    border:1px solid rgba(15,14,12,.3);border-radius:7px;background:var(--paper);
    color:var(--ink);font-family:inherit;padding-right:8px;
  }
  .price-input:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .price-chf{font-size:11px;color:var(--muted);font-weight:700}
  .locked{text-align:center;padding:24px 10px;color:var(--muted);font-size:13px}
  .pwd-input{
    width:100%;padding:12px;font-size:20px;text-align:center;letter-spacing:.3em;
    border:1px solid rgba(15,14,12,.3);border-radius:9px;background:var(--paper);
    font-family:inherit;margin:12px 0;
  }

  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:24px;
    font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  #printArea{display:none}
  @media print{
    body>*{display:none!important}
    #printArea{display:block!important;padding:0}
    @page{margin:1.5cm}
    .p-break{page-break-before:always;break-before:page}
    .p-doc-head{font-size:11px;color:#555;margin-bottom:10px}
    .p-title{font-size:20px;font-weight:700;margin-bottom:2px}
    .p-sub{font-size:12px;color:#555;margin-bottom:14px}
    .p-table{width:100%;border-collapse:collapse;font-size:11px}
    .p-table th{background:#0f0e0c;color:#fff;padding:6px 8px;text-align:left;font-size:10px}
    .p-table td{padding:5px 8px;border-bottom:1px solid #ddd}
    .p-table td.num{text-align:center;font-weight:700;width:55px}
    .p-table tr:nth-child(even) td{background:#f4f0e6}
    .p-foot{margin-top:16px;font-size:11px;color:#555}
    /* copertina del PDF completo */
    .p-cover{page-break-after:always;break-after:page;padding-top:60px}
    .p-cover-title{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
    .p-cover-sub{font-size:16px;color:#444;margin-bottom:4px}
    .p-cover-date{font-size:13px;color:#777;margin-bottom:36px}
    .p-cover-list{border-top:2px solid #0f0e0c;padding-top:14px}
    .p-cover-row{display:flex;justify-content:space-between;padding:7px 4px;font-size:13px;border-bottom:1px solid #e5e0d0}
    .p-cover-row span:first-child{font-weight:600}
    .p-cover-row span:last-child{color:#555;font-variant-numeric:tabular-nums}
  }
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="h-title">
      <span class="cat" id="hCat">Inventario</span>
      The Bowling Hôtel
    </div>
    <div class="h-right">
      <div class="h-save"><span class="dot"></span><span id="saveStatus">Salvato</span></div>
      <button class="gear" onclick="openSettings()" title="Impostazioni">&#9881;</button>
    </div>
  </div>
  <div class="cat-bar">
    <select class="cat-select" id="catSelect" onchange="changeCategoria(this.value)"></select>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab bar active" data-zone="bar" onclick="switchZone('bar')"><span id="tabBar">BAR</span> <span class="badge" id="badgeBar">0</span></button>
    <button class="tab resto" data-zone="resto" onclick="switchZone('resto')"><span id="tabResto">RESTO</span> <span class="badge" id="badgeResto">0</span></button>
  </div>
</header>

<div class="searchbar">
  <input type="text" id="search" placeholder="Cerca prodotto" autocomplete="off">
</div>

<div class="progress">
  <span><span id="lblCounted">Contati</span>: <span class="pct" id="progText">0 / 0</span></span>
  <div class="pbar"><span id="progBar" style="width:0%"></span></div>
  <span class="pct" id="progPct">0%</span>
</div>
<div class="tipbar" id="tipBar"></div>

<div class="list" id="list"></div>

<div class="footer">
  <button class="btn-reset" onclick="confirmReset()" id="btnReset">Azzera</button>
  <button class="btn-export" onclick="openExport()" id="btnExport">Esporta PDF</button>
</div>

<!-- MODAL EXPORT -->
<div class="modal" id="exportModal">
  <div class="modal-box">
    <h3 id="exTitle">Esporta inventario</h3>
    <p id="exDesc">Crea il PDF della conta da inviare alla contabile.</p>
    <div class="hint" id="exHint"></div>
    <div class="col-block">
      <div class="col-head" style="background:var(--ink)">
        <span id="exRecap">RIEPILOGO</span>
        <span class="where" id="exportSummary"></span>
      </div>
      <div class="col-data" id="exportPreview"></div>
    </div>
    <div class="modal-actions" style="margin-bottom:8px">
      <button class="m-pdf" style="font-size:15px;padding:14px" onclick="printPDF('all')" id="exBtnPdfAll">PDF tutte le categorie</button>
    </div>
    <div class="modal-actions" style="margin-bottom:10px">
      <button class="m-pdf" style="background:var(--paper-2);color:var(--ink);font-size:14px;padding:12px" onclick="printPDF('one')" id="exBtnPdf">PDF questa categoria</button>
    </div>
    <div class="bigsteps" id="exSteps"></div>
    <div class="modal-actions">
      <button class="m-ghost" onclick="closeExport()" id="exBtnClose">Chiudi</button>
      <button class="m-ghost" onclick="copyRiepilogo()" id="exBtnCopy">Copia testo</button>
    </div>
  </div>
</div>

<!-- MODAL IMPOSTAZIONI -->
<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h3 id="setTitle">Impostazioni</h3>
    <div class="set-section">
      <div class="set-label" id="setLangLabel">Lingua</div>
      <div class="lang-row">
        <button class="lang-btn" data-lang="it" onclick="setLang('it')">Italiano</button>
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">Français</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
      </div>
    </div>
    <div class="set-section">
      <div class="set-label" id="setPriceLabel">Aggiorna prezzi d'acquisto</div>
      <div id="priceArea"></div>
    </div>
    <div class="modal-actions">
      <button class="m-ghost" onclick="closeSettings()" id="setBtnClose">Chiudi</button>
    </div>
  </div>
</div>

<!-- MODAL RESET -->
<div class="modal" id="resetModal">
  <div class="modal-box">
    <h3 id="rsTitle">Azzerare tutto?</h3>
    <p id="rsDesc">Tutte le quantità di questa categoria verranno cancellate.</p>
    <div id="rsPwdArea"></div>
    <div class="modal-actions">
      <button class="m-ghost" onclick="closeReset()" id="rsCancel">Annulla</button>
      <button class="m-primary" style="background:var(--warn)" onclick="tryReset()" id="rsOk">Sì, azzera</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="printArea"></div>

const LANG_KEY = "tbh_lang_v2";
let lang = "it";
let catIdx = 0;
let zone = "bar";
let counts = {};   // counts[catId] = {bar:{},resto:{}}  oppure {single:{}}
let prezzi = {};   // prezzi[catId] = {idx:prezzo}
let priceUnlocked = false;

function L(){ return T[lang]; }
function CAT(){ return CATEGORIE[catIdx]; }
function keyCounts(){ return "tbh_counts_v2"; }
function keyPrezzi(){ return "tbh_prezzi_v2"; }

/* --- PERSISTENZA --- */
function save(){
  try{
    localStorage.setItem(keyCounts(), JSON.stringify(counts));
    document.getElementById('saveStatus').textContent = L().ttSaved;
  }catch(e){ document.getElementById('saveStatus').textContent = "!"; }
}
function savePrezzi(){
  try{ localStorage.setItem(keyPrezzi(), JSON.stringify(prezzi)); }catch(e){}
}
function load(){
  try{ const r=localStorage.getItem(keyCounts()); if(r) counts=JSON.parse(r); }catch(e){ counts={}; }
  try{ const p=localStorage.getItem(keyPrezzi()); if(p) prezzi=JSON.parse(p); }catch(e){ prezzi={}; }
  try{ const l=localStorage.getItem(LANG_KEY); if(l && T[l]) lang=l; }catch(e){}
}

function ensureCat(){
  const id=CAT().id;
  if(!counts[id]) counts[id] = CAT().zona==='doppia' ? {bar:{},resto:{}} : {single:{}};
  if(CAT().zona==='doppia'){
    if(!counts[id].bar) counts[id].bar={};
    if(!counts[id].resto) counts[id].resto={};
  }else{
    if(!counts[id].single) counts[id].single={};
  }
  if(!prezzi[id]) prezzi[id]={};
}

/* --- PREZZO EFFETTIVO --- */
function prezzoDi(idx){
  const id=CAT().id;
  const p=prezzi[id] ? prezzi[id][idx] : undefined;
  return (p!==undefined && p!==null && p!=="") ? Number(p) : CAT().items[idx].pa;
}

/* --- FILTRO NUMERICO --- */
function filtraNumero(input){
  let v=input.value.replace(/,/g,'.').replace(/[^0-9.]/g,'');
  const i=v.indexOf('.');
  if(i!==-1) v=v.slice(0,i+1)+v.slice(i+1).replace(/\./g,'');
  input.value=v;
}

/* --- ZONA ATTIVA --- */
function activeStore(){
  const id=CAT().id;
  if(CAT().zona==='doppia') return counts[id][zone];
  return counts[id].single;
}

/* --- RENDER --- */
function render(){
  ensureCat();
  const q=document.getElementById('search').value.trim().toLowerCase();
  const list=document.getElementById('list');
  list.innerHTML="";
  const store=activeStore();
  const modeClass = CAT().zona==='doppia' ? (zone+'-mode') : 'single-mode';
  let shown=0;
  CAT().items.forEach((p,idx)=>{
    if(q && !p.n.toLowerCase().includes(q)) return;
    shown++;
    const val=store[idx];
    const hasVal=val!==undefined&&val!==null&&val!=="";
    const row=document.createElement('div');
    row.className="item "+modeClass+(hasVal?" counted":"");
    row.innerHTML=
      '<div class="item-num">'+(idx+1)+'</div>'+
      '<div class="item-info">'+
        '<div class="item-name">'+p.n+'</div>'+
        '<div class="item-meta"><span class="ref">'+(p.u||'-')+'</span>'+L().buy+': CHF '+prezzoDi(idx).toFixed(2)+'</div>'+
      '</div>'+
      '<div class="qty-box">'+
        '<button class="qty-btn" onclick="step('+idx+',-1)">−</button>'+
        '<input class="qty-input '+(hasVal?'has-val':'')+'" type="text" inputmode="decimal" '+
               'value="'+(hasVal?val:'')+'" placeholder="0" '+
               'oninput="filtraNumero(this)" onchange="setQty('+idx+',this.value)" onfocus="this.select()">'+
        '<button class="qty-btn" onclick="step('+idx+',1)">+</button>'+
      '</div>';
    list.appendChild(row);
  });
  if(shown===0) list.innerHTML='<div class="empty-search">— 0 —</div>';
  updateProgress();
}

function setQty(idx,value){
  const store=activeStore();
  const v=String(value).trim().replace(',','.');
  if(v===""||isNaN(parseFloat(v))) delete store[idx];
  else store[idx]=parseFloat(v);
  save(); render();
}
function step(idx,delta){
  const store=activeStore();
  const st=CAT().step;
  const cur=store[idx]||0;
  let next=Math.round((cur+delta*st)*100)/100;
  if(next<0) next=0;
  if(next===0) delete store[idx];
  else store[idx]=next;
  save(); render();
}
function switchZone(z){
  const doppia = CAT().zona==='doppia';
  // blocca click su schede non pertinenti alla categoria
  if(doppia && z==='single') return;
  if(!doppia && z!=='single') return;
  zone=z;
  buildTabs();
  updateProgress();
  render();
}

function updateProgress(){
  ensureCat();
  const id=CAT().id;
  const total=CAT().items.length;
  let done;
  if(CAT().zona==='doppia'){
    const dB=Object.keys(counts[id].bar).length;
    const dR=Object.keys(counts[id].resto).length;
    document.getElementById('badgeBar').textContent=dB;
    document.getElementById('badgeResto').textContent=dR;
    done=zone==='bar'?dB:dR;
  }else{
    done=Object.keys(counts[id].single).length;
    document.getElementById('badgeSingle') && (document.getElementById('badgeSingle').textContent=done);
  }
  document.getElementById('progText').textContent=done+" / "+total;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progPct').textContent=pct+"%";
  document.getElementById('progBar').style.width=pct+"%";
}

/* --- CATEGORIA --- */
function buildCatSelect(){
  const sel=document.getElementById('catSelect');
  sel.innerHTML="";
  CATEGORIE.forEach((c,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=c.nome+"  ("+c.items.length+")";
    sel.appendChild(o);
  });
  sel.value=catIdx;
}
function buildTabs(){
  const tabs=document.getElementById('tabs');
  const doppia = CAT().zona==='doppia';
  tabs.className="tabs";
  // 3 schede SEMPRE presenti: Bar | Resto | Cuisine.
  // Attive solo quelle che hanno senso per la categoria corrente.
  const tBar = doppia, tResto = doppia, tCuisine = !doppia;
  tabs.innerHTML=
    '<button class="tab bar'+(tBar?'':' disabled')+(zone==='bar'&&tBar?' active':'')+'" '+
      'data-zone="bar" '+(tBar?'onclick="switchZone(\'bar\')"':'')+'>'+
      '<span>'+L().bar+'</span> <span class="badge" id="badgeBar">0</span></button>'+
    '<button class="tab resto'+(tResto?'':' disabled')+(zone==='resto'&&tResto?' active':'')+'" '+
      'data-zone="resto" '+(tResto?'onclick="switchZone(\'resto\')"':'')+'>'+
      '<span>'+L().resto+'</span> <span class="badge" id="badgeResto">0</span></button>'+
    '<button class="tab cuisine'+(tCuisine?'':' disabled')+(zone==='single'&&tCuisine?' active':'')+'" '+
      'data-zone="single" '+(tCuisine?'onclick="switchZone(\'single\')"':'')+'>'+
      '<span>'+L().cuisine+'</span> <span class="badge" id="badgeSingle">0</span></button>';
}
function changeCategoria(i){
  catIdx=parseInt(i,10);
  // zona iniziale corretta: bar per le bevande, single (cuisine) per la cucina
  zone = CAT().zona==='doppia' ? 'bar' : 'single';
  buildTabs();
  document.getElementById('search').value="";
  updateTip();
  updateProgress();
  render();
}
function updateTip(){
  document.getElementById('tipBar').textContent = CAT().step<1 ? L().tipDec : L().tipInt;
}

  document.getElementById('lblCounted').textContent=t.counted;

  document.getElementById('btnReset').textContent=t.reset;

  document.getElementById('exTitle').textContent=t.exTitle;
  document.getElementById('exDesc').textContent=t.exDesc;
  document.getElementById('exHint').textContent=t.exHint;
  document.getElementById('exRecap').textContent=t.exRecap;
  document.getElementById('exSteps').textContent=t.exSteps;
  document.getElementById('exBtnPdf').textContent=t.exPdf;document.getElementById('exBtnPdfAll').textContent=t.exPdfAll;
  document.getElementById('exBtnClose').textContent=t.exClose;
  document.getElementById('exBtnCopy').textContent=t.exCopy;
  document.getElementById('setTitle').textContent=t.setTitle;
  document.getElementById('setLangLabel').textContent=t.setLang;
  document.getElementById('setPriceLabel').textContent=t.setPrice;
  document.getElementById('setBtnClose').textContent=t.setClose;

function setLang(l){
  lang=l;
  try{ localStorage.setItem(LANG_KEY,l); }catch(e){}
  applyLang();
}

/* --- IMPOSTAZIONI / PREZZI (con password) --- */
function openSettings(){
  priceUnlocked=false;
  renderPriceArea();
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('show'); }

function renderPriceArea(){
  const area=document.getElementById('priceArea');
  if(!priceUnlocked){
    area.innerHTML=
      '<div class="locked">'+
        '<div>'+L().pwdAsk+'</div>'+
        '<input class="pwd-input" id="pwdPrice" type="password" inputmode="numeric" '+
               'maxlength="8" placeholder="••••">'+
        '<button class="m-primary" style="width:100%;padding:12px;border:none;border-radius:9px;font-weight:700;font-family:inherit;font-size:14px;cursor:pointer" '+
                'onclick="tryUnlockPrices()">'+L().pwdOk+'</button>'+
      '</div>';
    return;
  }
  // sbloccato: selettore categoria + lista prezzi
  let opts="";
  CATEGORIE.forEach((c,i)=>{ opts+='<option value="'+i+'"'+(i===catIdx?' selected':'')+'>'+c.nome+'</option>'; });
  area.innerHTML=
    '<select class="price-cat-sel" id="priceCatSel" onchange="renderPriceList()">'+opts+'</select>'+
    '<input type="text" id="priceSearch" placeholder="'+L().search+'" '+
      'style="width:100%;padding:9px 12px;font-size:14px;border:1px solid rgba(15,14,12,.25);border-radius:8px;background:var(--paper);font-family:inherit;margin-bottom:8px">'+
    '<div class="price-list" id="priceList"></div>'+
    '<button class="m-ghost" style="width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer" '+
            'onclick="resetPricesCat()">'+L().resetPrices+'</button>';
  document.getElementById('priceSearch').addEventListener('input',renderPriceList);
  renderPriceList();
}
function tryUnlockPrices(){
  const v=document.getElementById('pwdPrice').value;
  if(v===PASSWORD){ priceUnlocked=true; renderPriceArea(); }
  else{ showToast(L().pwdWrong); document.getElementById('pwdPrice').value=""; }
}
function renderPriceList(){
  const ci=parseInt(document.getElementById('priceCatSel').value,10);
  const cat=CATEGORIE[ci];
  const q=(document.getElementById('priceSearch').value||"").trim().toLowerCase();
  const box=document.getElementById('priceList');
  box.innerHTML="";
  if(!prezzi[cat.id]) prezzi[cat.id]={};
  cat.items.forEach((p,idx)=>{
    if(q && !p.n.toLowerCase().includes(q)) return;
    const pr=prezzi[cat.id][idx];
    const val=(pr!==undefined&&pr!==null&&pr!=="")?Number(pr):p.pa;
    const row=document.createElement('div');
    row.className="price-row";
    row.innerHTML=
      '<div class="price-name">'+p.n+'</div>'+
      '<span class="price-chf">CHF</span>'+
      '<input class="price-input" type="text" inputmode="decimal" value="'+val.toFixed(2)+'" '+
             'oninput="filtraNumero(this)" onchange="setPrezzo(\''+cat.id+'\','+idx+',this.value)">';
    box.appendChild(row);
  });
}
function setPrezzo(catId,idx,value){
  if(!prezzi[catId]) prezzi[catId]={};
  const v=String(value).trim().replace(',','.');
  if(v===""||isNaN(parseFloat(v))) delete prezzi[catId][idx];
  else prezzi[catId][idx]=parseFloat(v);
  savePrezzi();
  render();
  showToast(L().ttPriceSaved);
}
function resetPricesCat(){
  const ci=parseInt(document.getElementById('priceCatSel').value,10);
  const catId=CATEGORIE[ci].id;
  prezzi[catId]={};
  savePrezzi();
  renderPriceList();
  render();
  showToast(L().ttPriceReset);
}

/* --- EXPORT --- */
function buildRows(){
  ensureCat();
  const id=CAT().id;
  return CAT().items.map((p,idx)=>{
    if(CAT().zona==='doppia'){
      const b=counts[id].bar[idx], r=counts[id].resto[idx];
      const bv=(b!==undefined&&b!==null&&b!=="")?b:"";
      const rv=(r!==undefined&&r!==null&&r!=="")?r:"";
      const tot=(bv===""&&rv==="")?"":((Number(b)||0)+(Number(r)||0));
      return {n:idx+1,nome:p.n,unita:p.u,pa:prezzoDi(idx),bar:bv,resto:rv,tot:tot,doppia:true};
    }else{
      const s=counts[id].single[idx];
      const sv=(s!==undefined&&s!==null&&s!=="")?s:"";
      return {n:idx+1,nome:p.n,unita:p.u,pa:prezzoDi(idx),qta:sv,doppia:false};
    }
  });
}
function openExport(){
  ensureCat();
  const id=CAT().id;
  let summ;
  if(CAT().zona==='doppia'){
    summ='Bar '+Object.keys(counts[id].bar).length+' · Resto '+Object.keys(counts[id].resto).length;
  }else{
    summ=L().counted+' '+Object.keys(counts[id].single).length;
  }
  document.getElementById('exportSummary').textContent=summ;
  document.getElementById('exportPreview').textContent=buildRiepilogo();
  document.getElementById('exportModal').classList.add('show');
}
function closeExport(){ document.getElementById('exportModal').classList.remove('show'); }

function buildRiepilogo(){
  const d=new Date();
  const loc=lang==='en'?'en-GB':(lang==='fr'?'fr-FR':'it-IT');
  const dataStr=d.toLocaleDateString(loc,{day:'2-digit',month:'2-digit',year:'numeric'});
  let t="INVENTARIO "+CAT().nome.toUpperCase()+" — TBH\n"+L().confDate+" "+dataStr+"\n";
  t+="------------------------------\n";
  let n=0;
  buildRows().forEach(r=>{
    if(r.doppia){
      if(r.bar!==""||r.resto!==""){
        n++;
        const b=r.bar===""?"0":String(r.bar).replace('.',',');
        const rr=r.resto===""?"0":String(r.resto).replace('.',',');
        const tt=String(r.tot).replace('.',',');
        t+=r.nome+": "+b+" / "+rr+" / "+tt+"\n";
      }
    }else{
      if(r.qta!==""){
        n++;
        t+=r.nome+": "+String(r.qta).replace('.',',')+"\n";
      }
    }
  });
  t+="------------------------------\n";
  t+=L().counted+": "+n+" / "+CAT().items.length;
  if(n===0) return L().noQty;
  return t;
}
function copyRiepilogo(){
  const text=buildRiepilogo();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(L().ttCopied)).catch(()=>fallbackCopy(text));
  }else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); showToast(L().ttCopied); }catch(e){}
  document.body.removeChild(ta);
}

/* Costruisce il blocco HTML stampabile di UNA categoria (indice ci).
   pageBreak=true → ogni categoria comincia su pagina nuova. */
function buildCatBlock(ci, pageBreak){
  const c = CATEGORIE[ci];
  const id = c.id;
  const doppia = c.zona==='doppia';
  // assicuro che il counts esista anche per categorie non ancora aperte
  if(!counts[id]) counts[id] = doppia ? {bar:{},resto:{}} : {single:{}};
  const dB = doppia ? Object.keys(counts[id].bar||{}).length : 0;
  const dR = doppia ? Object.keys(counts[id].resto||{}).length : 0;
  const dS = !doppia ? Object.keys(counts[id].single||{}).length : 0;
  const tot = c.items.length;
  let trs="";
  c.items.forEach((p,idx)=>{
    const pa = (prezzi[id] && prezzi[id][idx]!==undefined && prezzi[id][idx]!==null && prezzi[id][idx]!=="")
               ? Number(prezzi[id][idx]) : p.pa;
    if(doppia){
      const b=counts[id].bar[idx], r=counts[id].resto[idx];
      const bv=(b!==undefined&&b!==null&&b!=="")?b:"–";
      const rv=(r!==undefined&&r!==null&&r!=="")?r:"–";
      const tv=(bv==="–"&&rv==="–")?"–":((Number(b)||0)+(Number(r)||0));
      trs+='<tr><td>'+(idx+1)+'</td><td>'+p.n+'</td><td>'+(p.u||'-')+'</td>'+
           '<td class="num">'+bv+'</td><td class="num">'+rv+'</td><td class="num">'+tv+'</td></tr>';
    }else{
      const s=counts[id].single[idx];
      const sv=(s!==undefined&&s!==null&&s!=="")?s:"–";
      trs+='<tr><td>'+(idx+1)+'</td><td>'+p.n+'</td><td>'+(p.u||'-')+'</td><td class="num">'+sv+'</td></tr>';
    }
  });
  const head = doppia
    ? '<th>#</th><th>'+L().tProd+'</th><th>Unité</th><th>Qté Bar</th><th>Qté Resto</th><th>Qté '+L().tTot+'</th>'
    : '<th>#</th><th>'+L().tProd+'</th><th>Unité</th><th>Qté '+L().cuisine+'</th>';
  const sub = doppia
    ? 'Bar: '+dB+'/'+tot+' · Resto: '+dR+'/'+tot
    : L().cuisine+': '+dS+'/'+tot;
  const breakCls = pageBreak ? ' class="p-break"' : '';
  return '<section'+breakCls+'>'+
    '<div class="p-title">'+c.nome+' — The Bowling Hôtel</div>'+
    '<div class="p-sub">'+sub+'</div>'+
    '<table class="p-table"><thead><tr>'+head+'</tr></thead><tbody>'+trs+'</tbody></table>'+
    '</section>';
}

function printPDF(mode){
  const d=new Date();
  const loc=lang==='en'?'en-GB':(lang==='fr'?'fr-FR':'it-IT');
  const dataStr=d.toLocaleDateString(loc,{day:'2-digit',month:'long',year:'numeric'});
  let body = "";
  if(mode==='all'){
    // copertina + 13 categorie, una per pagina
    body += '<section class="p-cover">'+
      '<div class="p-cover-title">Inventario completo</div>'+
      '<div class="p-cover-sub">The Bowling Hôtel</div>'+
      '<div class="p-cover-date">'+L().confDate+' '+dataStr+'</div>'+
      '<div class="p-cover-list">';
    CATEGORIE.forEach((c,i)=>{
      const id=c.id;
      const doppia=c.zona==='doppia';
      let cnt = 0;
      if(counts[id]){
        if(doppia){
          cnt = new Set([...Object.keys(counts[id].bar||{}),...Object.keys(counts[id].resto||{})]).size;
        }else{
          cnt = Object.keys(counts[id].single||{}).length;
        }
      }
      body += '<div class="p-cover-row"><span>'+(i+1)+'. '+c.nome+'</span><span>'+cnt+' / '+c.items.length+'</span></div>';
    });
    body += '</div></section>';
    CATEGORIE.forEach((c,i)=>{
      body += buildCatBlock(i, true);  // page break su ogni categoria
    });
  }else{
    // singola categoria
    body += '<div class="p-doc-head">'+L().confDate+' '+dataStr+'</div>';
    body += buildCatBlock(catIdx, false);
  }
  body += '<div class="p-foot">The Bowling Hôtel — Inventario.</div>';
  document.getElementById('printArea').innerHTML = body;
  showToast(L().ttPrint);
  setTimeout(()=>window.print(),300);
}

    '<input class="pwd-input" id="pwdReset" type="password" inputmode="numeric" maxlength="8" placeholder="••••">';
  document.getElementById('resetModal').classList.add('show');
}
function closeReset(){ document.getElementById('resetModal').classList.remove('show'); }
function tryReset(){
  const v=document.getElementById('pwdReset').value;
  if(v!==PASSWORD){ showToast(L().pwdWrong); document.getElementById('pwdReset').value=""; return; }
  ensureCat();
  const id=CAT().id;
  counts[id]= CAT().zona==='doppia' ? {bar:{},resto:{}} : {single:{}};
  save(); render(); closeReset();
  showToast(L().ttReset);
}

/* --- TOAST --- */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

load();
buildCatSelect();
applyLang();
buildTabs();
updateTip();
render();
